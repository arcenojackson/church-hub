name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────
  # Detect which areas of the codebase changed
  # ─────────────────────────────────────────────
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      functions: ${{ steps.filter.outputs.functions }}
      firestore: ${{ steps.filter.outputs.firestore }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            functions:
              - 'functions/**'
            firestore:
              - 'firestore.rules'
              - 'firestore.indexes.json'

  # ─────────────────────────────────────────────
  # Flutter — analyze + test (runs on every PR)
  # ─────────────────────────────────────────────
  flutter:
    name: Flutter — analyze & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --fatal-infos --fatal-warnings

      - name: Test
        run: flutter test --coverage

  # ─────────────────────────────────────────────
  # Firebase Functions — lint + build (TypeScript)
  # Runs only when functions/** changes
  # ─────────────────────────────────────────────
  functions:
    name: Functions — lint & build
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.functions == 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: functions/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: functions

      - name: Lint (ESLint)
        run: npm run lint
        working-directory: functions

      - name: Build (TypeScript)
        run: npm run build
        working-directory: functions

  # ─────────────────────────────────────────────
  # Firestore Rules — syntax validation via emulator
  # Runs only when firestore.rules or indexes change
  # ─────────────────────────────────────────────
  firestore-rules:
    name: Firestore — validate rules
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.firestore == 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Validate rules via emulator
        # Uses a demo project (no real credentials needed).
        # The emulator parses and validates firestore.rules on startup.
        run: |
          firebase emulators:exec \
            --only firestore \
            --project demo-church-hub \
            "echo 'Firestore rules OK'"
